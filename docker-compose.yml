version: '3.8'

services:
  ml-service:
    build: 
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ML_SERVICE_API_KEY=your_secure_api_key_here
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ML_SERVICE_BASE_URL=http://ml-service:8001
      - ML_SERVICE_API_KEY=your_secure_api_key_here
      - BLOCKCHAIN_SERVICE_BASE_URL=http://localhost:8545
    depends_on:
      - ml-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
